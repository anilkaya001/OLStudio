];
function buildPoly(verts,faces){const geo=new THREE.BufferGeometry(),pos=[],idx=[];verts.forEach(v=>pos.push(...v));faces.forEach(f=>{if(f.length===3)idx.push(f[0],f[1],f[2]);else if(f.length===4)idx.push(f[0],f[1],f[2],f[0],f[2],f[3])});geo.setAttribute("position",new THREE.Float32BufferAttribute(pos,3));geo.setIndex(idx);geo.computeVertexNormals();return geo}
let polyScene,polyCam,polyRen,polyMesh,polyWire,polyRaf=0,pDrag=false,pLast=new THREE.Vector2(),pRot=new THREE.Vector2();
function initPolyGallery(){const c=$("polyCanvas");polyRen=new THREE.WebGLRenderer({canvas:c,antialias:true,alpha:true});polyRen.setPixelRatio(Math.min(devicePixelRatio,2));polyScene=new THREE.Scene();polyCam=new THREE.PerspectiveCamera(40,1,.1,100);c.addEventListener("pointerdown",e=>{pDrag=true;pLast.set(e.clientX,e.clientY);c.setPointerCapture(e.pointerId)});c.addEventListener("pointermove",e=>{if(!pDrag)return;pRot.y+=(e.clientX-pLast.x)*.008;pRot.x+=(e.clientY-pLast.y)*.008;pLast.set(e.clientX,e.clientY)},{passive:true});c.addEventListener("pointerup",e=>{pDrag=false;c.releasePointerCapture(e.pointerId)});const nav=$("polyNav");POLYHEDRA.forEach((p,i)=>{const b=document.createElement("button");b.className="pnav";b.textContent=p.name;b.onclick=()=>showPoly(i);nav.appendChild(b)});showPoly(0)}
function showPoly(idx){$("polyName").textContent=POLYHEDRA[idx].name;document.querySelectorAll(".pnav").forEach((b,i)=>b.classList.toggle("active",i===idx));if(polyMesh){polyScene.remove(polyMesh);polyScene.remove(polyWire)}const geo=POLYHEDRA[idx].fn();geo.computeBoundingSphere();const r=geo.boundingSphere.radius,dist=(r*1.5)/Math.sin(polyCam.fov*Math.PI/360);polyCam.position.set(0,0,dist);polyMesh=new THREE.Mesh(geo,new THREE.ShaderMaterial({uniforms:{colorGold:{value:new THREE.Color("#A37E2C")},colorBronze:{value:new THREE.Color("#cd7f32")},colorBlue:{value:new THREE.Color("#080820")},camDist:{value:dist},radius:{value:r}},vertexShader:`varying vec3 vVP,vN;void main(){vN=normalize(normalMatrix*normal);vec4 mv=modelViewMatrix*vec4(position,1.);vVP=mv.xyz;gl_Position=projectionMatrix*mv;}`,fragmentShader:`uniform vec3 colorGold,colorBronze,colorBlue;uniform float camDist,radius;varying vec3 vVP,vN;void main(){float d=length(vVP),depth=clamp((d-(camDist-radius))/(radius*2.),0.,1.);vec3 c=depth<.5?mix(colorGold,colorBronze,depth*2.):mix(colorBronze,colorBlue,(depth-.5)*2.);vec3 n=normalize(vN),vd=normalize(-vVP),ld=normalize(vec3(1,1,1));float diff=max(dot(n,ld),0.),fres=pow(1.-max(dot(n,vd),0.),3.);gl_FragColor=vec4(c*(diff*.8+.2)+colorGold*fres*.6,1.);}`,side:THREE.DoubleSide}));polyWire=new THREE.LineSegments(new THREE.EdgesGeometry(geo),new THREE.LineBasicMaterial({color:0xA37E2C,transparent:true,opacity:.2}));polyScene.add(polyMesh);polyScene.add(polyWire);pRot.set(0,0)}
function polyFrame(){if(!$("polyModal").classList.contains("open")){polyRaf=0;return}polyRaf=requestAnimationFrame(polyFrame);const r=$("polyCard").getBoundingClientRect();polyRen.setSize(r.width,r.height,false);polyCam.aspect=r.width/r.height;polyCam.updateProjectionMatrix();if(polyMesh){if(!pDrag){pRot.y+=.005;pRot.x+=.002}polyMesh.rotation.set(pRot.x,pRot.y,0);polyWire.rotation.copy(polyMesh.rotation)}polyRen.render(polyScene,polyCam)}
$("polyBtn").addEventListener("click",()=>{if(!polyScene)initPolyGallery();$("polyModal").classList.add("open");if(!polyRaf)polyRaf=requestAnimationFrame(polyFrame)});
$("polyClose").addEventListener("click",()=>$("polyModal").classList.remove("open"));
$("polyModal").addEventListener("click",e=>{if(e.target===$("polyModal"))$("polyModal").classList.remove("open")});

/* ═══════ MAIN SCENE ═══════ */
try{
const canvas=$("gl"),W=()=>window.innerWidth||1,H=()=>window.innerHeight||1,dpr=()=>Math.min(devicePixelRatio||1,W()<800?1:1.5);
const ren=new THREE.WebGLRenderer({canvas,antialias:true,alpha:false,powerPreference:"high-performance"});
ren.setPixelRatio(dpr());ren.setSize(W(),H(),false);ren.outputColorSpace=THREE.SRGBColorSpace;ren.toneMapping=THREE.ACESFilmicToneMapping;ren.toneMappingExposure=1.4;
const scene=new THREE.Scene();scene.background=new THREE.Color("#010108");scene.fog=new THREE.FogExp2(0x010108,.00012);
const cam=new THREE.PerspectiveCamera(48,W()/H(),.1,12000);cam.position.set(0,40,320);
scene.add(new THREE.AmbientLight(0x0a0a22,.8));
const kL=new THREE.DirectionalLight(0xffeedd,2.5);kL.position.set(200,250,150);scene.add(kL);
const fL=new THREE.DirectionalLight(0x2244aa,1.2);fL.position.set(-250,80,200);scene.add(fL);
const rL=new THREE.PointLight(0xA37E2C,4,2000,1.2);rL.position.set(0,-150,-400);scene.add(rL);
const ptr=new THREE.Vector2();let ptrOn=false;const mob=W()<800;

/* ─── LAYOUT CONSTANTS (vertical axis of symmetry) ─── */
const NODE_Y=30;    /* cuboctahedron floats here            */
const TITLE_Y=-55;  /* text sits well below, no overlap     */
const MID_Y=(NODE_Y+TITLE_Y)/2; /* ≈ -12.5 — camera aims here */

/* ─── TITLE ─── */
let titleSpr;
function makeTitle(){
  const w=2560,h=512,c=document.createElement("canvas");c.width=w;c.height=h;const g=c.getContext("2d");
  g.shadowColor="#A37E2C";g.shadowBlur=15;g.font="300 120px 'Latin Modern Roman',Georgia,serif";g.textAlign="center";g.textBaseline="middle";
  g.fillStyle="#A37E2C";g.fillText("In Econometrics We Trust",w/2,h/2);g.shadowBlur=0;g.fillText("In Econometrics We Trust",w/2,h/2);
  const tex=new THREE.CanvasTexture(c);tex.colorSpace=THREE.SRGBColorSpace;
  const spr=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true,depthWrite:false,opacity:1}));
  spr.position.set(0,TITLE_Y,-60);return spr;
}
titleSpr=makeTitle();scene.add(titleSpr);
function resizeTitle(){if(!titleSpr)return;const dist=cam.position.z-titleSpr.position.z,visH=2*Math.tan(cam.fov*Math.PI/360)*dist,tw=Math.min(450,visH*cam.aspect*.85);titleSpr.scale.set(tw,tw/5,1)}
resizeTitle();

/* ─── MANIFOLD STARS ─── */
function manifoldStars(count,R,tubeR,szMin,szMax){
  const COLS=[[.6,.7,1],[.7,.8,1],[.9,.92,1],[1,.98,.9],[1,.95,.7],[1,.8,.5],[1,.6,.4]];
  const pos=new Float32Array(count*3),sz=new Float32Array(count),col=new Float32Array(count*3),ph=new Float32Array(count);
  for(let i=0;i<count;i++){const u=Math.random()*Math.PI*2,v=Math.random()*Math.PI*2,r=tubeR*Math.sqrt(Math.random());const cx=R*(Math.sin(u)+2*Math.sin(2*u)),cy=R*(Math.cos(u)-2*Math.cos(2*u)),cz=R*(-Math.sin(3*u));const dx=R*(Math.cos(u)+4*Math.cos(2*u)),dy=R*(-Math.sin(u)+4*Math.sin(2*u)),dz=R*(-3*Math.cos(3*u));const T=new THREE.Vector3(dx,dy,dz).normalize(),N=new THREE.Vector3().crossVectors(T,new THREE.Vector3(0,1,0)).normalize(),B=new THREE.Vector3().crossVectors(T,N).normalize();pos[i*3]=cx+r*Math.cos(v)*N.x+r*Math.sin(v)*B.x;pos[i*3+1]=(cz+r*Math.cos(v)*N.z+r*Math.sin(v)*B.z)*.6;pos[i*3+2]=cy+r*Math.cos(v)*N.y+r*Math.sin(v)*B.y;const mag=Math.pow(Math.random(),2.5);sz[i]=szMin+(szMax-szMin)*mag;const cls=COLS[Math.min(6,Math.floor(Math.pow(Math.random(),.6)*7))],br=.4+mag*.6;col[i*3]=cls[0]*br;col[i*3+1]=cls[1]*br;col[i*3+2]=cls[2]*br;ph[i]=Math.random()*6.28}
  const geo=new THREE.BufferGeometry();geo.setAttribute("position",new THREE.BufferAttribute(pos,3));geo.setAttribute("aSize",new THREE.BufferAttribute(sz,1));geo.setAttribute("aColor",new THREE.BufferAttribute(col,3));geo.setAttribute("aPhase",new THREE.BufferAttribute(ph,1));
  const mat=new THREE.ShaderMaterial({transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,uniforms:{uTime:{value:0}},
    vertexShader:`attribute float aSize;attribute vec3 aColor;attribute float aPhase;varying vec3 vC;varying float vA,vPh;uniform float uTime;void main(){vec3 p=position;p.x+=sin(uTime*.1+p.z*.002)*5.;p.y+=cos(uTime*.08+p.x*.002)*4.;vec4 mv=modelViewMatrix*vec4(p,1.);gl_Position=projectionMatrix*mv;gl_PointSize=aSize*(900./-mv.z);vA=smoothstep(4000.,80.,length(p));vC=aColor;vPh=aPhase;}`,
    fragmentShader:`varying vec3 vC;varying float vA,vPh;uniform float uTime;void main(){vec2 uv=gl_PointCoord.xy-.5;float d=dot(uv,uv),tw=.65+.35*sin(uTime*2.+vPh),core=smoothstep(.25,.0,d),spike=max(0.,1.-25.*min(abs(uv.x),abs(uv.y)))*smoothstep(.12,.0,d)*.25,glow=exp(-d*14.)*.3;gl_FragColor=vec4(vC*(1.+spike*2.),(core+spike+glow)*vA*tw*.9);}`});
  return{mesh:new THREE.Points(geo,mat),mat}}
const S1=manifoldStars(mob?20000:55000,220,60,.4,4),S2=manifoldStars(mob?8000:25000,350,40,.3,2);
const starGrp=new THREE.Group();starGrp.add(S1.mesh);starGrp.add(S2.mesh);scene.add(starGrp);

/* ─── GRID ─── */
const gridU={uTime:{value:0},uGold:{value:new THREE.Color("#A37E2C")}};
const gridFloor=new THREE.Mesh(new THREE.PlaneGeometry(8000,8000,64,64),new THREE.ShaderMaterial({transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,uniforms:gridU,
  vertexShader:`varying vec2 vUv;varying vec3 vP;uniform float uTime;void main(){vUv=uv;vec3 p=position;p.y+=sin(p.x*.004+uTime*.5)*6.+cos(p.z*.005+uTime*.3)*4.;vP=(modelMatrix*vec4(p,1.)).xyz;gl_Position=projectionMatrix*viewMatrix*vec4(vP,1.);}`,
  fragmentShader:`varying vec2 vUv;varying vec3 vP;uniform float uTime;uniform vec3 uGold;void main(){float d=length(vP.xz);vec2 g=fract(vUv*180.-vec2(0.,uTime*.03));float line=min(g.x,g.y);float a=smoothstep(.06,.0,line)*exp(-d*.0007)*.18;gl_FragColor=vec4(uGold*(.7+.3*sin(uTime*.8+d*.002)),a);}`}));
gridFloor.rotation.x=-Math.PI/2;gridFloor.position.y=-200;scene.add(gridFloor);

/* ─── CUBOCTAHEDRON NODE ─── */
const gGrp=new THREE.Group();scene.add(gGrp);let nodeObj=null;
function makeCuboctahedron(s){const v=[[s,s,0],[-s,s,0],[-s,-s,0],[s,-s,0],[s,0,s],[-s,0,s],[-s,0,-s],[s,0,-s],[0,s,s],[0,-s,s],[0,-s,-s],[0,s,-s]],f=[[0,8,1,11],[1,5,2,6],[2,9,3,10],[0,7,3,4],[8,4,9,5],[11,6,10,7],[0,4,8],[1,8,5],[2,5,9],[3,9,4],[0,11,7],[1,6,11],[2,10,6],[3,7,10]];return buildPoly(v,f)}
function buildNode(){
  if(nodeObj)gGrp.remove(nodeObj.group);const minDim=Math.min(W(),H()),sc=Math.max(.35,Math.min(minDim/800,1.2)),rad=12*sc;
  const group=new THREE.Group(),art=ARTICLE_REGISTRY[0];
  const cGeo=makeCuboctahedron(rad);
  group.add(new THREE.Mesh(cGeo,new THREE.MeshPhysicalMaterial({color:0x080818,metalness:.2,roughness:.05,transmission:.6,thickness:2,ior:1.8,clearcoat:1,clearcoatRoughness:.02,emissive:0x0a0a20,emissiveIntensity:1})));
  group.add(new THREE.LineSegments(new THREE.EdgesGeometry(cGeo),new THREE.LineBasicMaterial({color:0xA37E2C,transparent:true,opacity:.85})));
  /* Title label — centered */
  const lc=document.createElement("canvas");lc.width=1024;lc.height=128;const lg=lc.getContext("2d");lg.fillStyle="#fff";lg.textAlign="center";lg.textBaseline="middle";lg.font="800 60px 'Latin Modern Roman',Georgia,serif";lg.fillText(art.title,512,64);
  const lbl=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(lc),transparent:true,depthWrite:false}));lbl.material.map.colorSpace=THREE.SRGBColorSpace;lbl.scale.set(120*sc,15*sc,1);lbl.position.y=-(rad+14*sc);group.add(lbl);
  /* Category · Date — centered */
  const cc=document.createElement("canvas");cc.width=512;cc.height=64;const cg=cc.getContext("2d");cg.fillStyle="rgba(163,126,44,0.8)";cg.textAlign="center";cg.textBaseline="middle";cg.font="600 28px 'Latin Modern Roman',Georgia,serif";cg.fillText(art.category+" \u2022 "+art.date,256,32);
  const cat=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(cc),transparent:true,depthWrite:false}));cat.material.map.colorSpace=THREE.SRGBColorSpace;cat.scale.set(80*sc,10*sc,1);cat.position.y=-(rad+26*sc);group.add(cat);
  group.traverse(ch=>{ch.userData.article=art});group.position.set(0,NODE_Y,0);gGrp.add(group);
  nodeObj={group,rad,rotVel:new THREE.Vector2(0,0)}
}
buildNode();

/* ─── DRAG ─── */
let isDragging=false,wasDragged=false,dragStart=new THREE.Vector2(),lastDrag=new THREE.Vector2();
canvas.addEventListener("pointerdown",e=>{if(document.body.classList.contains("modal-open"))return;const r=canvas.getBoundingClientRect();dragStart.set(e.clientX-r.left,e.clientY-r.top);lastDrag.copy(dragStart);isDragging=true;wasDragged=false;canvas.setPointerCapture(e.pointerId)});
canvas.addEventListener("pointermove",e=>{const r=canvas.getBoundingClientRect();ptr.x=((e.clientX-r.left)/Math.max(1,r.width))*2-1;ptr.y=-((e.clientY-r.top)/Math.max(1,r.height))*2+1;ptrOn=true;if(isDragging&&nodeObj){const cx=e.clientX-r.left,cy=e.clientY-r.top;nodeObj.rotVel.x+=(cy-lastDrag.y)*.008;nodeObj.rotVel.y+=(cx-lastDrag.x)*.008;lastDrag.set(cx,cy);if(Math.abs(cx-dragStart.x)+Math.abs(cy-dragStart.y)>5)wasDragged=true}},{passive:true});
canvas.addEventListener("pointerup",e=>{isDragging=false;canvas.releasePointerCapture(e.pointerId)});
canvas.addEventListener("click",e=>{if(document.body.classList.contains("modal-open")||wasDragged)return;const r=canvas.getBoundingClientRect();ptr.x=((e.clientX-r.left)/Math.max(1,r.width))*2-1;ptr.y=-((e.clientY-r.top)/Math.max(1,r.height))*2+1;ray.setFromCamera(ptr,cam);const h=ray.intersectObjects(gGrp.children,true).find(x=>x.object.userData.article);if(h)openArticle(h.object.userData.article)});

const ray=new THREE.Raycaster();let hovN=false;
const clk=new THREE.Clock();let raf=0,gt=0;
window._pause=()=>{if(raf){cancelAnimationFrame(raf);raf=0}};
window._resume=()=>{if(!raf){clk.getDelta();raf=requestAnimationFrame(frame)}};

function frame(){
  raf=requestAnimationFrame(frame);if(document.body.classList.contains("modal-open"))return;
  const dt=Math.min(.033,clk.getDelta());gt+=dt;
  /* Camera orbits around MID_Y for symmetric framing */
  const nx=ptrOn?ptr.x:0,ny=ptrOn?-ptr.y:0,orbA=gt*.015;
  cam.position.x+=(nx*80+Math.sin(orbA)*15-cam.position.x)*.03;
  cam.position.y+=(MID_Y+20-ny*50+Math.cos(orbA*.7)*8-cam.position.y)*.03;
  cam.lookAt(0,MID_Y,0);
  /* Hover */
  if(ptrOn&&!isDragging){ray.setFromCamera(ptr,cam);hovN=!!ray.intersectObjects(gGrp.children,true).find(x=>x.object.userData.article);document.body.style.cursor=hovN?"pointer":"grab"}
  if(isDragging)document.body.style.cursor="grabbing";
  /* Animate */
  S1.mat.uniforms.uTime.value=S2.mat.uniforms.uTime.value=gt;
  starGrp.children[0].rotation.y=gt*.01;starGrp.children[1].rotation.y=gt*.006;
  gridU.uTime.value=gt;
  if(nodeObj){const n=nodeObj;if(!isDragging)n.rotVel.multiplyScalar(.96);n.group.rotation.x+=n.rotVel.x*dt*2;n.group.rotation.y+=n.rotVel.y*dt*2;if(Math.abs(n.rotVel.x)<.01&&Math.abs(n.rotVel.y)<.01){n.group.rotation.x+=dt*.15;n.group.rotation.y+=dt*.25}const ts=hovN?1.15:1;n.group.scale.lerp(new THREE.Vector3(ts,ts,ts),.06);n.group.position.y=NODE_Y+Math.sin(gt*1.2)*3+Math.cos(gt*.7)*2}
  ren.render(scene,cam);
}

window.addEventListener("resize",()=>{cam.aspect=W()/H();cam.updateProjectionMatrix();ren.setPixelRatio(dpr());ren.setSize(W(),H(),false);buildNode();resizeTitle()},{passive:true});
$("brand").addEventListener("click",()=>{cam.position.set(0,40,320);if(nodeObj){nodeObj.rotVel.set(0,0);nodeObj.group.rotation.set(0,0,0)}});
canvas.classList.add("ready");window._resume();
}catch(e){showErr(e)}
</script>
