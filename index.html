<style>
:root {
    color-scheme: dark;
    --font-main: "Latin Modern Roman", serif;
    --font-ui: "Latin Modern Sans", sans-serif;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --nav-h: 60px;
    --bg: #020203;
    --border: rgba(255, 255, 255, 0.08);
    --silver: #e8e8ea;
    --silver-dim: rgba(232, 232, 234, 0.65);
    --gold: #ffe600;
    --gold-soft: #F7E7CE;
    --gold-glow: color-mix(in oklab, var(--gold) 20%, transparent);
    --card-bg: rgba(10, 10, 12, 0.95);
    --card-border: rgba(255, 230, 0, 0.25);
    --card-shadow: 0 30px 80px rgba(0,0,0,0.95), 0 0 0 1px var(--card-border) inset;
    --base-font-size: 0.9rem;
}
html, body { height: 100%; margin: 0; padding: 0; }
body {
    background: var(--bg); color: var(--silver); font-family: var(--font-main);
    overflow: hidden; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
}
#gl {
    position: fixed; inset: 0; width: 100%; height: 100%; display: block; z-index: 1; 
    touch-action: none; user-select: none; opacity: 0;
    transition: opacity 1.2s ease, transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}
#gl.ready { opacity: 1; }
body.modal-open #gl { transform: scale(1.02); opacity: 0.3; filter: blur(4px); }
body.modal-open #depthName, body.modal-open #orbitHint { opacity: 0 !important; }
* { box-sizing: border-box; }

a:hover { opacity: 0.9; }
:focus-visible { outline: 2px solid var(--gold-soft); outline-offset: 3px; border-radius: 8px; }
#nav {
    position: fixed; top: 0; left: 0; right: 0; height: calc(var(--nav-h) + var(--safe-top));
    padding-top: var(--safe-top); padding-left: clamp(20px, 5vw, 48px); padding-right: clamp(20px, 5vw, 48px);
    display: flex; align-items: center; justify-content: space-between; z-index: 1000;

    border-bottom: 1px solid rgba(255, 255, 255, 0.1);

.article-content { font-family: var(--font-main) !important; font-size: var(--base-font-size); line-height: 1.75; color: color-mix(in oklab, var(--silver) 90%, var(--silver-dim)); text-align: justify; text-justify: inter-word; letter-spacing: 0.1px; }
.article-content h1, .article-content h2, .article-content h3, .article-content h4 { font-family: var(--font-main) !important; color: var(--gold); line-height: 1.3; margin: 2.5rem 0 1rem; text-align: left; font-weight: normal; }

.expand-btn:hover { background: rgba(255,230,0,0.1); color: var(--gold); border-color: var(--gold); transform: translateY(-2px); box-shadow: 0 4px 15px var(--gold-glow); }

.article-content pre { background: rgba(10, 10, 12, 0.95); border: 1px solid var(--border); padding: 1rem; border-radius: 4px; overflow-x: auto; font-family: ui-monospace, SFMono-Regular, Consolas, monospace !important; font-size: 0.75rem; color: #d1d1d1; margin: 0; line-height: 1.5; box-shadow: inset 0 2px 10px rgba(0,0,0,0.5); }

<script>
window.addEventListener('load', function() {
    requestAnimationFrame(function() {
        requestAnimationFrame(function() {
            setTimeout(initApp, 100); 
        });
    });
});

function initApp() {
"use strict";

var $ = function(id){ return document.getElementById(id); };
function cssVar(name){ return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }
function showErr(e){
  var txt = $("errText");
  if(txt) txt.textContent = (e && (e.stack || e.message)) ? (e.stack || e.message) : String(e);
  $("err").style.display = "block";
}

function sanitizeHTML(str) {
  if (!str) return "";
  if (window.DOMPurify) return window.DOMPurify.sanitize(str, { USE_PROFILES: { html: true }, FORBID_TAGS: ["style","script","iframe","object","embed","form"] });
  return str.replace(/<script\b[^>]*>([\s\S]*?)<\/script>/gim, "").replace(/<(iframe|object|embed|form|style)\b[^>]*>([\s\S]*?)<\/\1>/gim, "");
}

var CONFIG = {
  githubUser: "anilkaya001",
  githubRepo: "OLStudio",
  articlesFolder: "articles"
};

var ARTICLE_CACHE = new Map();
var ARTICLES = [];

async function loadArticle(a){
  if (ARTICLE_CACHE.has(a.id)) return ARTICLE_CACHE.get(a.id);
  var rawHTML = a.rawHTML || "";
  if (!rawHTML && a.downloadUrl) {
    try {
      var r = await fetch(a.downloadUrl);
      if (!r.ok) throw new Error("HTTP " + r.status);
      var txt = await r.text();
      var doc = new DOMParser().parseFromString(txt, "text/html");
      var node = doc.querySelector("[data-title]") || doc.querySelector("main") || doc.body;
      rawHTML = node.innerHTML;
    } catch(e) {
      rawHTML = '<p style="text-align:center;color:var(--gold-soft)">Could not load article. Please try again.</p>';
    }
  }
  var meta = { title: a.title, date: a.date, category: a.category };
  var payload = { meta: meta, safeHTML: sanitizeHTML(rawHTML) };
  ARTICLE_CACHE.set(a.id, payload);
  return payload;
}

var modal = $("modal"), contentArea = $("articleContentArea"), scrollCtx = modal;
var modalJustOpenedAt = 0;

function closeModal(){
  modal.classList.remove("open"); document.body.classList.remove("modal-open");
  scrollCtx.scrollTop = 0; $("readProgress").style.width = "0%";
  if (window.resume3D) window.resume3D();
}

modal.addEventListener("click", function(e){ if (performance.now() - modalJustOpenedAt > 250 && e.target === modal) closeModal(); });
window.addEventListener("keydown", function(e){ if (e.key==="Escape" && modal.classList.contains("open")) closeModal(); }, { passive:true });
$("closeBtn").addEventListener("click", closeModal);

scrollCtx.addEventListener("scroll", function(e) { 
    var el = e.target;
    $("readProgress").style.width = ((el.scrollTop / Math.max(1, el.scrollHeight - el.clientHeight)) * 100) + "%"; 
}, { passive: true });

/* ─── FIX 2: gate on rawHTML OR downloadUrl so fetched articles render ─── */
window.openArticle = function(a){
  modalJustOpenedAt = performance.now();
  modal.classList.add("open"); document.body.classList.add("modal-open");
  if (window.pause3D) window.pause3D();

  contentArea.innerHTML = '<header class="article-header"><div class="meta"><span class="pill">' + (a.category||"") + '</span><span>&bull;</span><span>' + (a.date||"") + '</span></div><h1>' + (a.title||"") + '</h1></header><p id="loadingLine">Decrypting Node...</p>';

  if (a.rawHTML || a.downloadUrl) {
      loadArticle(a).then(function(result){
        var meta = result.meta, safeHTML = result.safeHTML;
        contentArea.innerHTML = '<header class="article-header"><div class="meta"><span class="pill">' + (meta.category||"") + '</span><span>&bull;</span><span>' + (meta.date||"") + '</span></div><h1>' + (meta.title||"") + '</h1></header>' + safeHTML;
        
        contentArea.querySelectorAll('a[href]').forEach(function(link){
          if (/^https?:\/\//i.test(link.getAttribute("href"))) { link.setAttribute("target","_blank"); link.setAttribute("rel","noopener noreferrer"); }
        });

        };
      } catch(e) {
        return { id: fallbackId, title: fallbackId.replace(/-/g," "), date:"", category:"Research", downloadUrl: url };
      }
    }

    var articleMeta = [];

    // Strategy 1: same-origin _list.json (fast, zero rate-limit risk)
    try {
      var listRes = await fetch("/" + CONFIG.articlesFolder + "/_list.json?t=" + Date.now());
      if (listRes.ok) {
        var filenames = await listRes.json();
        var htmlFiles = filenames.filter(function(f){ return f.endsWith(".html") && !f.startsWith("_"); });
        articleMeta = await Promise.all(
          htmlFiles.map(function(f){ return parseMeta("/" + CONFIG.articlesFolder + "/" + f, f.replace(".html","")); })
        );
      }
    } catch(e) { /* _list.json absent — fall through to GitHub API */ }

    // Strategy 2: GitHub API (fallback)
    if (articleMeta.length === 0) {
      try {
        var res = await fetch(
          "https://api.github.com/repos/" + CONFIG.githubUser + "/" + CONFIG.githubRepo + "/contents/" + CONFIG.articlesFolder,
          { headers: { Accept: "application/vnd.github.v3+json" } }
        );
        if (res.status === 403 || res.status === 429) {
          console.warn("GitHub API rate-limited — will retry in 15 s");
          setTimeout(loadDynamicArticles, 15000);
          return;
        }
        if (res.ok) {
          var files = await res.json();
          var htmlFiles = files.filter(function(f){ return f.name.endsWith(".html") && !f.name.startsWith("_"); });
          articleMeta = await Promise.all(
            htmlFiles.map(function(f){ return parseMeta(f.download_url, f.name.replace(".html","")); })
          );
        }
      } catch(e) { console.error("GitHub API fallback error:", e); }
    }

    if (articleMeta.length > 0) {
      ARTICLES = articleMeta;
      // Cache metadata without rawHTML to keep sessionStorage lean
      try {
        var cacheData = ARTICLES.map(function(a){
          return { id: a.id, title: a.title, date: a.date, category: a.category, downloadUrl: a.downloadUrl };
        });
        sessionStorage.setItem(cacheKey, JSON.stringify(cacheData));
      } catch(e) { /* quota — skip */ }
      buildGraph();
    }
  }
  loadDynamicArticles();

} catch(e) { showErr(e); }

}
</script>
