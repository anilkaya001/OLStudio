function getHexCoords(total){
  const coords=[[0,0]];let ring=1;
  while(coords.length<total){
    const dirs=[[-1,1],[-1,0],[0,-1],[1,-1],[1,0],[0,1]];
    let q=ring,r=0;
    for(let i=0;i<6;i++){
      for(let j=0;j<ring;j++){
        if(coords.length>=total) break;
        coords.push([q+r*0.5,r]); 
        q+=dirs[i][0]; r+=dirs[i][1];
      }
    }
    ring++;
  }
  let sumX=0,sumY=0;
  coords.forEach(c=>{sumX+=c[0];sumY+=c[1];});
  const cx=sumX/total,cy=sumY/total;
  return coords.map(c=>[c[0]-cx,c[1]-cy]);
}

  g.fillText("IN ECONOMETRICS",w/2,h/2 - 80);
  g.fillText("WE TRUST",w/2,h/2 + 80);
  const tex=new THREE.CanvasTexture(c);tex.colorSpace=THREE.SRGBColorSpace;
  // Attached to camera, so it acts like a giant, perfectly static backdrop
  const spr=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true,depthWrite:false,opacity:0.25}));
  spr.position.set(0,0,-800); 
  return spr;
}
titleSpr=makeTitle();cam.add(titleSpr);

function resizeTitle(){
  if(!titleSpr)return;
  const dist=-titleSpr.position.z;
  const visH=2*Math.tan(cam.fov*Math.PI/360)*dist;
  const visW=visH*cam.aspect;
  const tw=Math.min(visW*0.9, 1200);
  titleSpr.scale.set(tw,tw*(1024/2560),1);
}
resizeTitle();

/* ─── MANIFOLD STARS ─── */
function manifoldStars(count,R,tubeR,szMin,szMax){
  const COLS=[[.6,.7,1],[.7,.8,1],[.9,.92,1],[1,.98,.9],[1,.95,.7],[1,.8,.5],[1,.6,.4]];
  const pos=new Float32Array(count*3),sz=new Float32Array(count),col=new Float32Array(count*3),ph=new Float32Array(count);
  for(let i=0;i<count;i++){const u=Math.random()*Math.PI*2,v=Math.random()*Math.PI*2,r=tubeR*Math.sqrt(Math.random());const cx=R*(Math.sin(u)+2*Math.sin(2*u)),cy=R*(Math.cos(u)-2*Math.cos(2*u)),cz=R*(-Math.sin(3*u));const dx=R*(Math.cos(u)+4*Math.cos(2*u)),dy=R*(-Math.sin(u)+4*Math.sin(2*u)),dz=R*(-3*Math.cos(3*u));const T=new THREE.Vector3(dx,dy,dz).normalize(),N=new THREE.Vector3().crossVectors(T,new THREE.Vector3(0,1,0)).normalize(),B=new THREE.Vector3().crossVectors(T,N).normalize();pos[i*3]=cx+r*Math.cos(v)*N.x+r*Math.sin(v)*B.x;pos[i*3+1]=(cz+r*Math.cos(v)*N.z+r*Math.sin(v)*B.z)*.6;pos[i*3+2]=cy+r*Math.cos(v)*N.y+r*Math.sin(v)*B.y;const mag=Math.pow(Math.random(),2.5);sz[i]=szMin+(szMax-szMin)*mag;const cls=COLS[Math.min(6,Math.floor(Math.pow(Math.random(),.6)*7))],br=.4+mag*.6;col[i*3]=cls[0]*br;col[i*3+1]=cls[1]*br;col[i*3+2]=cls[2]*br;ph[i]=Math.random()*6.28}
  const geo=new THREE.BufferGeometry();geo.setAttribute("position",new THREE.BufferAttribute(pos,3));geo.setAttribute("aSize",new THREE.BufferAttribute(sz,1));geo.setAttribute("aColor",new THREE.BufferAttribute(col,3));geo.setAttribute("aPhase",new THREE.BufferAttribute(ph,1));
  const mat=new THREE.ShaderMaterial({transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,uniforms:{uTime:{value:0}},
    vertexShader:`attribute float aSize;attribute vec3 aColor;attribute float aPhase;varying vec3 vC;varying float vA,vPh;uniform float uTime;void main(){vec3 p=position;p.x+=sin(uTime*.1+p.z*.002)*5.;p.y+=cos(uTime*.08+p.x*.002)*4.;vec4 mv=modelViewMatrix*vec4(p,1.);gl_Position=projectionMatrix*mv;gl_PointSize=aSize*(900./-mv.z);vA=smoothstep(4000.,80.,length(p));vC=aColor;vPh=aPhase;}`,
    fragmentShader:`varying vec3 vC;varying float vA,vPh;uniform float uTime;void main(){vec2 uv=gl_PointCoord.xy-.5;float d=dot(uv,uv),tw=.65+.35*sin(uTime*2.+vPh),core=smoothstep(.25,.0,d),spike=max(0.,1.-25.*min(abs(uv.x),abs(uv.y)))*smoothstep(.12,.0,d)*.25,glow=exp(-d*14.)*.3;gl_FragColor=vec4(vC*(1.+spike*2.),(core+spike+glow)*vA*tw*.9);}`});
  return{mesh:new THREE.Points(geo,mat),mat}}
const S1=manifoldStars(mob?30000:80000,220,60,.15,2.2),S2=manifoldStars(mob?15000:45000,350,40,.1,1.4);
const starGrp=new THREE.Group();starGrp.add(S1.mesh);starGrp.add(S2.mesh);scene.add(starGrp);

/* ─── GRID ─── */
const gridU={uTime:{value:0},uGold:{value:new THREE.Color("#DAA520")}};
const gridFloor=new THREE.Mesh(new THREE.PlaneGeometry(8000,8000,64,64),new THREE.ShaderMaterial({transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,uniforms:gridU,
  vertexShader:`varying vec2 vUv;varying vec3 vP;uniform float uTime;void main(){vUv=uv;vec3 p=position;p.y+=sin(p.x*.004+uTime*.5)*6.+cos(p.z*.005+uTime*.3)*4.;vP=(modelMatrix*vec4(p,1.)).xyz;gl_Position=projectionMatrix*viewMatrix*vec4(vP,1.);}`,
  fragmentShader:`varying vec2 vUv;varying vec3 vP;uniform float uTime;uniform vec3 uGold;void main(){float d=length(vP.xz);vec2 g=fract(vUv*180.-vec2(0.,uTime*.03));float line=min(g.x,g.y);float a=smoothstep(.06,.0,line)*exp(-d*.0007)*.18;gl_FragColor=vec4(uGold*(.7+.3*sin(uTime*.8+d*.002)),a);}`}));
gridFloor.rotation.x=-Math.PI/2;gridFloor.position.y=-200;scene.add(gridFloor);

/* ─── FLOATING DECORATIVE POLYHEDRA ─── */
const floaters=[];
const FLOAT_DEFS=[
  {geo:()=>new THREE.IcosahedronGeometry(6,0),  pos:[-120,80,-80], spd:[.3,.4,.2]},
  {geo:()=>new THREE.DodecahedronGeometry(5,0), pos:[140,10,-120], spd:[.2,.35,.25]},
  {geo:()=>new THREE.OctahedronGeometry(7,0),   pos:[-80,-40,-60], spd:[.35,.2,.3]},
  {geo:()=>new THREE.TetrahedronGeometry(5,0),  pos:[100,70,-100], spd:[.25,.3,.35]},
  {geo:()=>new THREE.IcosahedronGeometry(4,0),  pos:[-160,-20,-140],spd:[.15,.25,.2]},
  {geo:()=>new THREE.DodecahedronGeometry(3,0), pos:[60,-60,-40],  spd:[.4,.15,.3]},
  {geo:()=>new THREE.OctahedronGeometry(4.5,0), pos:[180,50,-160], spd:[.2,.3,.15]},
];
FLOAT_DEFS.forEach(fd=>{
  const geo=fd.geo();geo.computeBoundingSphere();
  const r=geo.boundingSphere.radius,dist=cam.position.z-fd.pos[2];
  const grp=new THREE.Group();
  grp.add(new THREE.Mesh(geo,new THREE.ShaderMaterial({uniforms:{cG:{value:new THREE.Color("#DAA520")},cBr:{value:new THREE.Color("#cd7f32")},cBl:{value:new THREE.Color("#080820")},cD:{value:dist},rad:{value:r}},vertexShader:polyVS,fragmentShader:polyFS,side:THREE.DoubleSide,transparent:true})));
  grp.add(new THREE.LineSegments(new THREE.EdgesGeometry(geo),new THREE.LineBasicMaterial({color:0xDAA520,transparent:true,opacity:.15})));
  grp.position.set(...fd.pos);
  scene.add(grp);
  floaters.push({grp,spd:fd.spd,base:fd.pos.slice()});
});

/* ─── ARTICLE NODES & INTERCONNECTIONS ─── */
const gGrp=new THREE.Group();
scene.add(gGrp);
let nodeObjs=[];
let edgesMesh=null, edgesList=[];

function buildNodes(){
  nodeObjs.forEach(n=>gGrp.remove(n.group));nodeObjs=[];
  if(edgesMesh) { gGrp.remove(edgesMesh); edgesMesh=null; }
  
  const minDim=Math.min(W(),H()),sc=Math.max(.3,Math.min(minDim/900,1)),rad=7*sc;
  const count=ARTICLE_REGISTRY.length;
  const coords=getHexCoords(count);
  const spacing=54*sc; // spacing tweaked for interconnections
  
  ARTICLE_REGISTRY.forEach((art,idx)=>{
    const group=new THREE.Group(),cGeo=makeCuboctahedron(rad);
    group.add(new THREE.Mesh(cGeo,new THREE.MeshPhysicalMaterial({color:0x080818,metalness:.2,roughness:.05,transmission:.6,thickness:2,ior:1.8,clearcoat:1,clearcoatRoughness:.02,emissive:0x0a0a20,emissiveIntensity:1})));
    group.add(new THREE.LineSegments(new THREE.EdgesGeometry(cGeo),new THREE.LineBasicMaterial({color:0xDAA520,transparent:true,opacity:.85})));
    /* halo */
    const hc=document.createElement("canvas");hc.width=hc.height=256;const hg=hc.getContext("2d"),hgr=hg.createRadialGradient(128,128,0,128,128,128);
    hgr.addColorStop(0,"rgba(218,165,32,0.4)");hgr.addColorStop(.3,"rgba(218,165,32,0.12)");hgr.addColorStop(.6,"rgba(218,165,32,0.03)");hgr.addColorStop(1,"rgba(0,0,0,0)");
    hg.fillStyle=hgr;hg.fillRect(0,0,256,256);
    const haloTex=new THREE.CanvasTexture(hc);haloTex.colorSpace=THREE.SRGBColorSpace;
    const halo=new THREE.Sprite(new THREE.SpriteMaterial({map:haloTex,transparent:true,blending:THREE.AdditiveBlending,depthWrite:false}));
    halo.scale.set(rad*8,rad*8,1);group.add(halo);
    /* title label */
    const lc=document.createElement("canvas");lc.width=1024;lc.height=128;const lg=lc.getContext("2d");lg.fillStyle="#fff";lg.textAlign="center";lg.textBaseline="middle";lg.font="800 56px 'Latin Modern Roman',serif";lg.fillText(art.title,512,64);
    const lbl=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(lc),transparent:true,depthWrite:false}));lbl.material.map.colorSpace=THREE.SRGBColorSpace;lbl.scale.set(90*sc,11*sc,1);lbl.position.y=-(rad+10*sc);group.add(lbl);
    
    group.traverse(ch=>{ch.userData.article=art; ch.userData.nodeIdx=idx}); // tag for raycasting
    
    const baseX=coords[idx][0]*spacing;
    const baseY=coords[idx][1]*spacing*0.866; 
    
    group.position.set(baseX, baseY, 0);
    gGrp.add(group);
    
    // Nodes hold their physical state for the drag-spring physics
    nodeObjs.push({
        group, rad, rotVel:new THREE.Vector2(0,0), idx,
        baseX, baseY, baseZ: 0,
        pos: new THREE.Vector3(baseX, baseY, 0),
        vel: new THREE.Vector3(0,0,0),
        isDragged: false
    });
  });

  // Calculate Neural Interconnections
  edgesList=[];
  for(let i=0; i<count; i++){
      for(let j=i+1; j<count; j++){
          const dist = Math.hypot(nodeObjs[i].baseX - nodeObjs[j].baseX, nodeObjs[i].baseY - nodeObjs[j].baseY);
          if(dist < spacing * 1.2) edgesList.push([i, j]);
      }
  }
  const lineGeo = new THREE.BufferGeometry();
  lineGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(edgesList.length * 6), 3));
  edgesMesh = new THREE.LineSegments(lineGeo, new THREE.LineBasicMaterial({color: 0xDAA520, transparent: true, opacity: 0.25}));
  gGrp.add(edgesMesh);
}
buildNodes();

/* ─── INTERACTION PHYSICS (DRAG, ORBIT & SPRINGS) ─── */
let isOrbitDragging=false, draggedNode=null, wasDragged=false;
let dragStart=new THREE.Vector2(), lastDrag=new THREE.Vector2();
let targetGrpRotX=0, targetGrpRotY=0; 

const planeNormal=new THREE.Vector3(0,0,1);
const dragPlane=new THREE.Plane(planeNormal,0);
const dragOffset=new THREE.Vector3();

canvas.addEventListener("pointerdown",e=>{
  if(document.body.classList.contains("modal-open"))return;
  const r=canvas.getBoundingClientRect();
  dragStart.set(e.clientX, e.clientY);
  lastDrag.copy(dragStart);
  wasDragged=false;
  canvas.setPointerCapture(e.pointerId);

  ptr.x=((e.clientX-r.left)/Math.max(1,r.width))*2-1;
  ptr.y=-((e.clientY-r.top)/Math.max(1,r.height))*2+1;
  ray.setFromCamera(ptr,cam);
  
  const h=ray.intersectObjects(gGrp.children,true).find(x=>x.object.userData.article);
  if(h){
      let p=h.object;
      while(p && p.userData.nodeIdx === undefined && p.parent) p=p.parent;
      if(p && p.userData.nodeIdx !== undefined){
          draggedNode = nodeObjs[p.userData.nodeIdx];
          draggedNode.isDragged = true;
          // Calibrate math plane perfectly to node's position relative to camera direction
          const camDir = new THREE.Vector3();
          cam.getWorldDirection(camDir);
          dragPlane.setFromNormalAndCoplanarPoint(camDir.negate(), h.point);
          const localHit = gGrp.worldToLocal(h.point.clone());
          dragOffset.copy(localHit).sub(draggedNode.pos);
      }
  }else{
      isOrbitDragging=true;
  }
});

canvas.addEventListener("pointermove",e=>{
  const r=canvas.getBoundingClientRect();
  ptr.x=((e.clientX-r.left)/Math.max(1,r.width))*2-1;
  ptr.y=-((e.clientY-r.top)/Math.max(1,r.height))*2+1;
  ptrOn=true;
  
  if(draggedNode){
      ray.setFromCamera(ptr,cam);
      const target=new THREE.Vector3();
      if(ray.intersectPlane(dragPlane, target)){
          const localTarget = gGrp.worldToLocal(target);
          draggedNode.pos.copy(localTarget).sub(dragOffset);
          // Spin geometry while dragging
          draggedNode.rotVel.x += (e.clientY-lastDrag.y)*0.01;
          draggedNode.rotVel.y += (e.clientX-lastDrag.x)*0.01;
          if(dragStart.distanceTo(new THREE.Vector2(e.clientX,e.clientY))>5) wasDragged=true;
      }
      lastDrag.set(e.clientX,e.clientY);
  } else if(isOrbitDragging && nodeObjs.length){
      const cx=e.clientX, cy=e.clientY;
      targetGrpRotY+=(cx-lastDrag.x)*0.003;
      targetGrpRotX+=(cy-lastDrag.y)*0.003;
      targetGrpRotX=Math.max(-0.25,Math.min(0.25,targetGrpRotX));
      targetGrpRotY=Math.max(-0.4,Math.min(0.4,targetGrpRotY));
      lastDrag.set(cx,cy);
      if(Math.abs(cx-dragStart.x)+Math.abs(cy-dragStart.y)>5) wasDragged=true;
  }
},{passive:true});

canvas.addEventListener("pointerup",e=>{
  if(draggedNode) draggedNode.isDragged=false;
  isOrbitDragging=false;
  draggedNode=null;
  canvas.releasePointerCapture(e.pointerId);
});

canvas.addEventListener("click",e=>{
  if(document.body.classList.contains("modal-open")||wasDragged)return;
  ray.setFromCamera(ptr,cam);
  const h=ray.intersectObjects(gGrp.children,true).find(x=>x.object.userData.article);
  if(h)openArticle(h.object.userData.article);
});

const ray=new THREE.Raycaster();let hovIdx=-1;
const clk=new THREE.Clock();let raf=0,gt=0;
window._pause=()=>{if(raf){cancelAnimationFrame(raf);raf=0}};
window._resume=()=>{if(!raf){clk.getDelta();raf=requestAnimationFrame(frame)}};

function frame(){
  raf=requestAnimationFrame(frame);if(document.body.classList.contains("modal-open"))return;
  const dt=Math.min(.033,clk.getDelta());gt+=dt;
  const nx=ptrOn?ptr.x:0,ny=ptrOn?-ptr.y:0,orbA=gt*.015;
  
  // Camera subtly follows mouse around 0,0,0
  cam.position.x += (nx * 30 - cam.position.x) * 0.05;
  cam.position.y += (-ny * 25 - cam.position.y) * 0.05;
  cam.lookAt(0,0,0);
  
  /* Raycast Hover */
  hovIdx=-1;
  if(ptrOn && !isOrbitDragging && !draggedNode){
      ray.setFromCamera(ptr,cam);
      const h=ray.intersectObjects(gGrp.children,true).find(x=>x.object.userData.article);
      if(h){
          let p=h.object;
          while(p && p.userData.nodeIdx === undefined && p.parent) p=p.parent;
          if(p && p.userData.nodeIdx !== undefined) hovIdx=p.userData.nodeIdx;
      }
  }
  document.body.style.cursor=(hovIdx!==-1 || draggedNode) ? (draggedNode ? "grabbing" : "pointer") : (isOrbitDragging ? "grabbing" : "grab");
  
  /* Background Elements */
  S1.mat.uniforms.uTime.value=S2.mat.uniforms.uTime.value=gt;
  starGrp.children[0].rotation.y=gt*.01;starGrp.children[1].rotation.y=gt*.006;
  gridU.uTime.value=gt;
  
  floaters.forEach((f,i)=>{
    f.grp.rotation.x+=f.spd[0]*dt;f.grp.rotation.y+=f.spd[1]*dt;f.grp.rotation.z+=f.spd[2]*dt;
    f.grp.position.y=f.base[1]+Math.sin(gt*.4+i*2.1)*12;
    f.grp.position.x=f.base[0]+Math.sin(gt*.15+i*1.3)*8;
  });
  
  /* Orbital Rotation Physics */
  if(!isOrbitDragging){
    targetGrpRotX*=0.95; 
    targetGrpRotY*=0.95;
  }
  gGrp.rotation.x+=(targetGrpRotX-gGrp.rotation.x)*0.08;
  gGrp.rotation.y+=(targetGrpRotY-gGrp.rotation.y)*0.08;

  /* Individual Node Physics & Springs */
  nodeObjs.forEach(n=>{
    if(!n.isDragged){
        // Calculate elastic return vector based on spring tension
        n.vel.x += (n.baseX - n.pos.x) * 0.06;
        n.vel.y += (n.baseY - n.pos.y) * 0.06;
        n.vel.z += (n.baseZ - n.pos.z) * 0.06;
        n.vel.multiplyScalar(0.78); // Apply friction/damping
        n.pos.add(n.vel);
    }
    
    // Add subtle ambient floating wave over the calculated physical anchor
    const bx = Math.sin(gt*0.8+n.idx*2.9)*1.5;
    const by = Math.sin(gt*1.2+n.idx*1.7)*2.5;
    n.group.position.set(n.pos.x + bx, n.pos.y + by, n.pos.z);
    
    // Aesthetic rotations
    n.rotVel.multiplyScalar(0.96);
    n.group.rotation.x += n.rotVel.x * dt * 2;
    n.group.rotation.y += n.rotVel.y * dt * 2;
    if(Math.abs(n.rotVel.x)<.01 && Math.abs(n.rotVel.y)<.01){
        n.group.rotation.x+=dt*.15; n.group.rotation.y+=dt*.25;
    }
    
    // Scale pump logic
    const ts=(hovIdx===n.idx || n.isDragged) ? 1.15 : 1;
    n.group.scale.lerp(new THREE.Vector3(ts,ts,ts), 0.1);
  });
  
  /* Update Neural Interconnections Geometry */
  if(edgesMesh){
      const posAttr=edgesMesh.geometry.attributes.position;
      let i=0;
      edgesList.forEach(e=>{
          const p1 = nodeObjs[e[0]].group.position;
          const p2 = nodeObjs[e[1]].group.position;
          posAttr.setXYZ(i++, p1.x, p1.y, p1.z);
          posAttr.setXYZ(i++, p2.x, p2.y, p2.z);
      });
      posAttr.needsUpdate=true;
  }

  ren.render(scene,cam);
}

window.addEventListener("resize",()=>{cam.aspect=W()/H();cam.updateProjectionMatrix();ren.setPixelRatio(dpr());ren.setSize(W(),H(),false);buildNodes();resizeTitle()},{passive:true});
$("brand").addEventListener("click",()=>{
  cam.position.set(0,0,480);
  targetGrpRotX=0;targetGrpRotY=0;
  nodeObjs.forEach(n=>{n.rotVel.set(0,0);n.group.rotation.set(0,0,0)})
});
canvas.classList.add("ready");window._resume();
}catch(e){showErr(e)}
</script>
